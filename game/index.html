<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <style>
    :root {
      --bg: #0b0f17;
      --surface: rgba(18, 24, 39, 0.72);
      --surface-strong: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f5f7ff;
      --muted: #9aa5c2;
      --accent: #7c5cff;
      --success: #4ade80;
      --danger: #f56565;
      --warning: #fbbf24;
      --card-shadow: 0 24px 80px rgba(7, 12, 27, 0.35);
      --radius: 28px;
      --transition: 220ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top left, rgba(124, 92, 255, 0.28), transparent 25%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 20%),
        linear-gradient(180deg, #090c14 0%, #0f172a 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 920px);
      display: grid;
      gap: 24px;
    }

    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      box-shadow: var(--card-shadow);
      padding: 32px;
      overflow: hidden;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
    }

    .hero {
      max-width: 540px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2.1rem, 4vw, 3.2rem);
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .score-panel {
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 16px;
      width: 100%;
    }

    .score-card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      background: rgba(255,255,255,0.04);
      display: grid;
      gap: 8px;
    }

    .score-card strong {
      display: block;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--text);
    }

    .arena {
      display: grid;
      gap: 24px;
    }

    .result-panel {
      display: grid;
      gap: 18px;
      padding: 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .result-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .result-summary .message {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-summary .message span {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .result-summary h2 {
      margin: 0;
      font-size: clamp(1.6rem, 2vw, 2.4rem);
    }

    .status-chip {
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
    }

    .status-chip.win { background: rgba(74, 222, 128, 0.12); color: var(--success); }
    .status-chip.loss { background: rgba(245, 101, 101, 0.12); color: var(--danger); }
    .status-chip.tie { background: rgba(251, 191, 36, 0.12); color: var(--warning); }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .choice-button {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 20px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition);
      display: grid;
      gap: 12px;
      justify-items: center;
      align-items: center;
      min-height: 160px;
    }

    .choice-button:hover {
      transform: translateY(-4px);
      border-color: rgba(124,92,255,0.48);
      box-shadow: 0 18px 45px rgba(124,92,255,0.18);
    }

    .choice-button:active {
      transform: scale(0.98);
      background: rgba(255,255,255,0.08);
    }

    .choice-button span {
      font-size: 3.5rem;
      line-height: 1;
    }

    .choice-label {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .shake {
      animation: pulse-shake 0.55s ease;
    }

    @keyframes pulse-shake {
      0% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(-6deg); }
      50% { transform: translateY(8px) rotate(6deg); }
      75% { transform: translateY(-6px) rotate(-3deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .history-card {
      display: grid;
      gap: 16px;
      padding: 22px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .history-card h3 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .history-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .history-item span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .history-pill {
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.76rem;
    }

    .history-pill.win { background: rgba(74, 222, 128, 0.14); color: var(--success); }
    .history-pill.loss { background: rgba(245, 101, 101, 0.14); color: var(--danger); }
    .history-pill.tie { background: rgba(251, 191, 36, 0.14); color: var(--warning); }

    @media (max-width: 720px) {
      .score-panel {
        grid-template-columns: 1fr;
      }
      .choices {
        grid-template-columns: 1fr;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="game-card" aria-labelledby="game-title">
      <header>
        <div class="hero">
          <h1 id="game-title">Rock Paper Scissors</h1>
          <p>Challenge a CPU opponent in a polished dark mode arena. Pick your move and watch the score update instantly.</p>
        </div>
        <div class="score-panel" aria-label="Scoreboard">
          <div class="score-card">
            <strong>Player</strong>
            <div class="score-value" id="player-score">0</div>
          </div>
          <div class="score-card">
            <strong>CPU</strong>
            <div class="score-value" id="cpu-score">0</div>
          </div>
        </div>
      </header>

      <section class="arena">
        <div class="result-panel">
          <div class="result-summary">
            <div class="message">
              <span>Last result</span>
              <h2 id="round-result">Make your move</h2>
            </div>
            <div class="status-chip tie" id="result-chip">Ready</div>
          </div>

          <div class="choices" role="group" aria-label="Pick Rock Paper or Scissors">
            <button class="choice-button" data-choice="rock" type="button">
              <span>🪨</span>
              <div class="choice-label">Rock</div>
            </button>
            <button class="choice-button" data-choice="paper" type="button">
              <span>📄</span>
              <div class="choice-label">Paper</div>
            </button>
            <button class="choice-button" data-choice="scissors" type="button">
              <span>✂️</span>
              <div class="choice-label">Scissors</div>
            </button>
          </div>
        </div>

        <div class="history-card">
          <h3>Round History</h3>
          <ul class="history-list" id="history-list" aria-live="polite">
            <li class="history-item"><span>No rounds played yet.</span></li>
          </ul>
        </div>
      </section>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const gameState = {
        playerScore: 0,
        cpuScore: 0,
        history: []
      };

      const choices = ['rock', 'paper', 'scissors'];
      const choiceButtons = document.querySelectorAll('.choice-button');
      const playerScoreEl = document.getElementById('player-score');
      const cpuScoreEl = document.getElementById('cpu-score');
      const resultText = document.getElementById('round-result');
      const resultChip = document.getElementById('result-chip');
      const historyList = document.getElementById('history-list');

      const resultsMap = {
        win: { label: 'You Win', class: 'win' },
        loss: { label: 'You Lose', class: 'loss' },
        tie: { label: 'Tie Game', class: 'tie' }
      };

      function determineWinner(player, cpu) {
        if (player === cpu) return 'tie';

        const winsAgainst = {
          rock: 'scissors',
          paper: 'rock',
          scissors: 'paper'
        };

        return winsAgainst[player] === cpu ? 'win' : 'loss';
      }

      function getCpuChoice() {
        const index = Math.floor(Math.random() * choices.length);
        return choices[index];
      }

      function formatEmoji(choice) {
        return {
          rock: '🪨',
          paper: '📄',
          scissors: '✂️'
        }[choice];
      }

      function updateScoreboard() {
        playerScoreEl.textContent = gameState.playerScore;
        cpuScoreEl.textContent = gameState.cpuScore;
      }

      function updateResultDisplay(player, cpu, outcome) {
        const { label, class: statusClass } = resultsMap[outcome];
        resultText.textContent = `${label}: ${formatEmoji(player)} vs ${formatEmoji(cpu)}`;
        resultChip.textContent = label;
        resultChip.className = `status-chip ${statusClass}`;
      }

      function updateHistory(player, cpu, outcome) {
        gameState.history.unshift({ player, cpu, outcome, time: new Date() });
        if (gameState.history.length > 3) {
          gameState.history.length = 3;
        }

        historyList.innerHTML = '';

        gameState.history.forEach(entry => {
          const item = document.createElement('li');
          item.className = 'history-item';

          const description = document.createElement('span');
          description.textContent = `${formatEmoji(entry.player)} ${entry.player} vs ${formatEmoji(entry.cpu)} ${entry.cpu}`;

          const badge = document.createElement('div');
          badge.className = `history-pill ${entry.outcome}`;
          badge.textContent = resultsMap[entry.outcome].label;

          item.append(description, badge);
          historyList.append(item);
        });
      }

      function playRound(playerChoice, button) {
        const cpuChoice = getCpuChoice();
        const outcome = determineWinner(playerChoice, cpuChoice);

        if (outcome === 'win') {
          gameState.playerScore += 1;
        } else if (outcome === 'loss') {
          gameState.cpuScore += 1;
        }

        updateScoreboard();
        updateResultDisplay(playerChoice, cpuChoice, outcome);
        updateHistory(playerChoice, cpuChoice, outcome);

        button.classList.add('shake');
        setTimeout(() => button.classList.remove('shake'), 550);
      }

      choiceButtons.forEach(button => {
        button.addEventListener('click', () => {
          const playerChoice = button.getAttribute('data-choice');
          playRound(playerChoice, button);
        });
      });
    });
  </script>
</body>
</html>
